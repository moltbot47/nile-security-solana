# docker-compose.prod.yml — Production overlay for NILE Security.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Requires .env with all NILE_* variables set (see .env.mainnet.example).

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${NILE_DB_PASSWORD:?Set NILE_DB_PASSWORD}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    restart: unless-stopped

  backend:
    environment:
      NILE_ENV: production
      NILE_DEBUG: "false"
      NILE_DATABASE_URL: postgresql+asyncpg://nile:${NILE_DB_PASSWORD}@postgres:5432/nile
      NILE_REDIS_URL: redis://redis:6379/0
      NILE_JWT_SECRET: ${NILE_JWT_SECRET:?Set NILE_JWT_SECRET}
      NILE_API_KEY: ${NILE_API_KEY:?Set NILE_API_KEY}
      NILE_CORS_ORIGINS: ${NILE_CORS_ORIGINS:-["https://nile.security"]}
      NILE_SOLANA_RPC_URL: ${NILE_SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      NILE_SOLANA_NETWORK: mainnet-beta
      NILE_PYTH_SOL_USD_FEED: H6ARHf6YXhGYeQfUzQNGk6rDNnLBQKrenN712K4AQJEG
      NILE_PROGRAM_ID: ${NILE_PROGRAM_ID:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  worker:
    environment:
      NILE_ENV: production
      NILE_DATABASE_URL: postgresql+asyncpg://nile:${NILE_DB_PASSWORD}@postgres:5432/nile
      NILE_REDIS_URL: redis://redis:6379/0
      NILE_SOLANA_RPC_URL: ${NILE_SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      NILE_SOLANA_NETWORK: mainnet-beta
    restart: unless-stopped

  frontend:
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pgdata_prod:
